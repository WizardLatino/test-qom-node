name: Build QOM with Ledger Support

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest  # amd64 nativo
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest  # Cross; agregar libs cross
          - goos: darwin
            goarch: amd64
            runner: macos-13  # amd64 nativo (Intel)
          - goos: darwin
            goarch: arm64
            runner: macos-latest  # arm64 nativo (Apple Silicon)
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest  # Cross; usar MinGW
      fail-fast: false
    env:
      CGO_ENABLED: 1
    steps:
      - name: Install dependencies
        run: |
          if [ "${{ matrix.goos }}" = "linux" ]; then
            sudo apt-get update
            sudo apt-get install -y git gcc g++ make libusb-1.0-0-dev libsecp256k1-dev
            if [ "${{ matrix.goarch }}" = "arm64" ]; then
              sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu libusb-1.0-dev-arm64-cross libsecp256k1-dev-arm64-cross  # Libs cross para arm64
            fi
          elif [ "${{ matrix.goos }}" = "darwin" ]; then
            brew install libusb secp256k1
            if [ "${{ matrix.goarch }}" = "amd64" ]; then
              arch -x86_64 brew install libusb secp256k1  # Usa Rosetta para libs amd64
            fi
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            sudo apt-get update
            sudo apt-get install -y git gcc g++ make mingw-w64
            # Instala libs cross para Windows (usa vcpkg o manual)
            git clone https://github.com/microsoft/vcpkg
            ./vcpkg/bootstrap-vcpkg.sh
            ./vcpkg/vcpkg install libusb:x64-mingw-static secp256k1:x64-mingw-static
            export PKG_CONFIG_PATH=$PWD/vcpkg/installed/x64-mingw-static/lib/pkgconfig
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'  # Actualiza para mejor soporte cross

      - name: Clone QomApp
        run: git clone https://github.com/QOM-One/QomApp

      - name: Install Go dependencies
        run: |
          cd QomApp
          go mod tidy

      - name: Build binary with ledger
        run: |
          cd QomApp
          mkdir -p build
          # Configuración cross
          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
            export GOARM=7
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            export CC=x86_64-w64-mingw32-gcc
            export CXX=x86_64-w64-mingw32-g++
          fi
          if [ "${{ matrix.goos }}" = "darwin" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            export SDKROOT=$(xcrun --sdk macosx --show-sdk-path)
            export MACOSX_DEPLOYMENT_TARGET=13.0
          fi
          # Siempre usa go build para consistencia, con output fijo
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -tags "netgo ledger" -ldflags "-X github.com/cosmos/cosmos-sdk/version.Name=qom -X github.com/cosmos/cosmos-sdk/version.AppName=qomd -X github.com/cosmos/cosmos-sdk/version.Version=1.0.0 -X github.com/cosmos/cosmos-sdk/version.Commit=189c0ac36652331df6995859b18b747955a4ebda -X github.com/tendermint/tendermint/version.TMCoreSemVer=v0.34.27 -X github.com/cosmos/cosmos-sdk/version.BuildTags=netgo,ledger -w -s" -trimpath -o build/qomd-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }} cmd/qomd/main.go || echo "Build failed with exit code $?"
          # Verifica
          ls -l build/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qomd-ledger-${{ matrix.goos }}-${{ matrix.goarch }}
          path: QomApp/build/qomd-*
          retention-days: 5